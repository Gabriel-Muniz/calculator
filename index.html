<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style/style.css">
    <link rel="stylesheet" media="screen" href="https://fontlibrary.org//face/segment7" type="text/css"/>
    <script src="scripts/main.js" defer></script>
    <title>Calculator</title>
</head>
<body>
    <div class="calc-body">
        <div class="calc-display">
            80085
        </div>
        <div class="calc-btns">
            <button class="num-btn" id="num1">7</button>
            <button class="num-btn" id="num2">8</button>
            <button class="num-btn" id="num3">9</button>
            <button class="num-btn" id="num4">4</button>
            <button class="num-btn" id="num5">5</button>
            <button class="num-btn" id="num6">6</button>
            <button class="num-btn" id="num7">1</button>
            <button class="num-btn" id="num8">2</button>
            <button class="num-btn" id="num9">3</button>
            <button class="num-btn" id="num0">0</button>
            <button class="num-btn" id="dot">.</button>
            <button class="equal-btn" id="equal">=</button>
            <button class="op-btn" id="division-op">/</button>
            <button class="op-btn" id="multiplication-op">x</button>
            <button class="op-btn" id="addition-op">+</button>
            <button class="op-btn" id="subtraction-op">-</button>
            <button class="func-btn" id="erase"><-</button>
        </div>
    </div>
</body>
</html>
