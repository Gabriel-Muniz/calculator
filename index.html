<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <script src="scripts/main.js" defer></script>
    <title>Calculator</title>
</head>

<body>
    <div class="header">CALCULATOR 3000</div>
    <div class="calc-body">
        <div class="calc-display">
            <div class="operation-viewer">0</div>
            <div class="selected-container">
                <span class="selected-number">0</span>
                <span class="selected-ghost">0</span>
            </div>
        </div>
        <div class="calc-btns">
            <button class="num-btn" id="num1" data-key="7">7</button>
            <button class="num-btn" id="num2" data-key="8">8</button>
            <button class="num-btn" id="num3" data-key="9">9</button>
            <button class="num-btn" id="num4" data-key="4">4</button>
            <button class="num-btn" id="num5" data-key="5">5</button>
            <button class="num-btn" id="num6" data-key="6">6</button>
            <button class="num-btn" id="num7" data-key="1">1</button>
            <button class="num-btn" id="num8" data-key="2">2</button>
            <button class="num-btn" id="num9" data-key="3">3</button>
            <button class="num-btn" id="num0" data-key="0">0</button>
            <button class="num-btn" id="dot" data-key=",">.</button>
            <button class="equal-btn" id="equal" data-key="Enter">=</button>
            <button class="op-btn" id="division-op" data-key="/">/</button>
            <button class="op-btn" id="multiplication-op" data-key="*">x</button>
            <button class="op-btn" id="addition-op" data-key="+">+</button>
            <button class="op-btn" id="subtraction-op" data-key="-">-</button>
            <button class="func-btn" id="erase" data-key="Backspace"> <- </button>
            <button class="func-btn" id="delete" data-key="Delete">AC</button>
        </div>
    </div>

    <div class="footer">Copyright &#169; &nbsp;
        <a class="link-footer" href="https://github.com/Gabriel-Muniz" target="_blank"> Gabriel Muniz 2023
            <img class="git-logo" src="./images/github-mark-white.svg" alt="">
        </a>
    </div>
</body>

</html>
